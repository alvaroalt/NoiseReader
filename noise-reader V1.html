<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --paper: #f5f0e8;
    --ink: #1a1612;
    --accent: #c8a96e;
    --muted: #6b6560;
    --border-subtle: #2a2a2a;
    --border-faint: #1e1e1e;
    --body-text: #d4cfc8;
    --title-border: #2a2a2a;
  }

  body.inverted {
    --bg: #f5f0e8;
    --paper: #1a1612;
    --accent: #8b5e1a;
    --muted: #8a7f76;
    --border-subtle: #d0c8bc;
    --border-faint: #ddd8cf;
    --body-text: #2e2925;
    --title-border: #c8c0b4;
  }

  body {
    background: var(--bg);
    color: var(--paper);
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.3s, color 0.3s;
  }

  /* ─── Header ─── */
  header {
    width: 100%;
    max-width: 860px;
    padding: 2.5rem 2rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    border-bottom: 1px solid var(--border-subtle);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--paper);
    transition: color 0.3s;
  }

  header span {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    transition: color 0.3s;
  }

  /* ─── Controls Bar ─── */
  .controls {
    width: 100%;
    max-width: 860px;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    border-bottom: 1px solid var(--border-faint);
    flex-wrap: wrap;
  }

  .upload-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .upload-btn:hover { background: var(--accent); color: var(--bg); }

  .noise-control {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex: 1;
  }

  .noise-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    white-space: nowrap;
  }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: var(--border-subtle);
    outline: none;
    cursor: pointer;
    transition: background 0.3s;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  .noise-value {
    font-size: 0.75rem;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    min-width: 2.8ch;
    text-align: right;
  }

  /* ─── Noise canvas covers full viewport ─── */
  #noise-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }

  /* All page content sits above canvas */
  header, .controls, .stage, .footer-line {
    position: relative;
    z-index: 2;
  }

  /* ─── Reader Stage ─── */
  .stage {
    width: 100%;
    max-width: 860px;
    flex: 1;
    min-height: 70vh;
    overflow: hidden;
  }

  /* Text layer */
  .text-layer {
    padding: 3rem 2rem 4rem;
    column-count: 1;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 1rem;
    text-align: center;
  }

  .placeholder-icon {
    font-size: 3.5rem;
    opacity: 0.15;
  }

  .placeholder p {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    line-height: 2;
  }

  /* Article text */
  .article-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 700;
    line-height: 1.2;
    color: var(--paper);
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--title-border);
    padding-bottom: 1.5rem;
    transition: color 0.3s, border-color 0.3s;
  }

  .article-body {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--body-text);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    max-width: 100%;
    font-family: 'Courier Prime', monospace;
    transition: color 0.3s;
  }

  /* ─── Bionic Reading styles ─── */
  .article-body.bionic {
    white-space: normal;
    word-break: break-word;
    overflow-wrap: break-word;
    max-width: 100%;
  }

  /* The bold anchor letters */
  .b {
    font-weight: 700;
    color: var(--paper);   /* slightly brighter than body text */
  }

  /* The dim tail letters */
  .t {
    opacity: 0.55;
  }

  /* ─── Footer line ─── */
  .footer-line {
    width: 100%;
    max-width: 860px;
    border-top: 1px solid var(--border-faint);
    padding: 0.8rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-line span {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    transition: color 0.3s;
  }

  /* Hidden file input */
  #file-input { display: none; }

  /* ─── PDF viewer ─── */
  /* ─── PDF flowing content ─── */
  .pdf-content {
    padding: 2rem 2rem 4rem;
  }

  .pdf-page-section {
    margin-bottom: 2.5rem;
  }

  .pdf-page-divider {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--muted);
    opacity: 0.5;
    margin: 2rem 0 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .pdf-page-divider::before,
  .pdf-page-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-faint);
  }

  /* Images extracted from PDF */
  .pdf-img-block {
    margin: 1.4rem 0;
    text-align: center;
  }
  .pdf-img-block img {
    max-width: 100%;
    height: auto;
    display: inline-block;
    border-radius: 2px;
    opacity: 0.92;
  }

  /* Loading indicator */
  .pdf-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 40vh;
    gap: 1rem;
  }

  .pdf-loading-bar {
    width: 180px;
    height: 2px;
    background: var(--border-subtle);
    overflow: hidden;
    position: relative;
  }

  .pdf-loading-bar::after {
    content: '';
    position: absolute;
    left: -60%;
    width: 60%;
    height: 100%;
    background: var(--accent);
    animation: pdfload 1.1s ease-in-out infinite;
  }

  @keyframes pdfload {
    0%   { left: -60%; }
    100% { left: 110%; }
  }

  .pdf-loading p {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  /* Noise type toggles */
  .noise-types {
    display: flex;
    gap: 0.4rem;
  }

  .noise-type-btn {
    background: none;
    border: 1px solid var(--border-subtle);
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .noise-type-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ─── Invert Button ─── */
  .invert-btn {
    background: none;
    border: 1px solid var(--border-subtle);
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .invert-btn:hover { border-color: var(--accent); color: var(--accent); }
  .invert-btn.active {
    background: var(--paper);
    color: var(--bg);
    border-color: var(--paper);
  }
  .invert-icon {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, currentColor 50%, transparent 50%);
    border: 1px solid currentColor;
    flex-shrink: 0;
  }

  /* ─── Bionic Button ─── */
  .bionic-btn {
    background: none;
    border: 1px solid var(--border-subtle);
    color: var(--muted);
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .bionic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bionic-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.08);
  }
  /* Little "B|" icon */
  .bionic-icon {
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: -0.05em;
    line-height: 1;
  }
</style>
</head>
<body>

<header>
  <h1>Noise Reader</h1>
  <span>Lectura con ruido</span>
</header>

<div class="controls">
  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    ↑ Cargar archivo
  </button>
  <input type="file" id="file-input" accept=".txt,.pdf">

  <div class="noise-control">
    <span class="noise-label">Ruido</span>
    <input type="range" id="noise-slider" min="0" max="100" value="35">
    <span class="noise-value" id="noise-val">35%</span>
  </div>

  <div class="noise-types">
    <button class="noise-type-btn active" data-type="static">Estático</button>
    <button class="noise-type-btn" data-type="scan">Scan</button>
    <button class="noise-type-btn" data-type="grain">Grano</button>
  </div>

  <button class="invert-btn" id="invert-btn">
    <span class="invert-icon"></span>
    Invertir
  </button>

  <button class="bionic-btn" id="bionic-btn">
    <span class="bionic-icon">B|</span>
    Biónico
  </button>
</div>

<canvas id="noise-canvas"></canvas>

<div class="stage">
  <div class="text-layer" id="text-layer">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">▤</div>
      <p>Carga un archivo .txt<br>para comenzar a leer</p>
    </div>
  </div>
</div>

<div class="footer-line">
  <span>Noise Reader v0.1</span>
  <span id="char-count">—</span>
</div>

<script>
// ══════════════════════════════════════════════════
//  NOISE ENGINE
// ══════════════════════════════════════════════════
const canvas = document.getElementById('noise-canvas');
const ctx    = canvas.getContext('2d');
let noiseOpacity = 0.35;
let noiseType    = 'static';
let scanY        = 0;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawStaticNoise() {
  const w = canvas.width, h = canvas.height;
  if (!w || !h) return;
  const imgData = ctx.createImageData(w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() > 0.5 ? 255 : 0;
    d[i] = v; d[i+1] = v; d[i+2] = v;
    d[i+3] = Math.random() * 200;
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawScanNoise() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const imgData = ctx.createImageData(w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.floor(Math.random() * 60);
    d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 80;
  }
  ctx.putImageData(imgData, 0, 0);
  const grad = ctx.createLinearGradient(0, scanY - 60, 0, scanY + 60);
  grad.addColorStop(0,   'rgba(200,169,110,0)');
  grad.addColorStop(0.5, 'rgba(200,169,110,0.15)');
  grad.addColorStop(1,   'rgba(200,169,110,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, scanY - 60, w, 120);
  ctx.strokeStyle = 'rgba(200,169,110,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, scanY); ctx.lineTo(w, scanY); ctx.stroke();
  scanY = (scanY + 1.5) % h;
}

function drawGrainNoise() {
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.createImageData(w, h);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.floor(Math.random() * 255);
    d[i] = v; d[i+1] = v; d[i+2] = v * 0.8;
    d[i+3] = Math.random() * 120;
  }
  ctx.putImageData(imgData, 0, 0);
}

function animate() {
  canvas.style.opacity = noiseOpacity;
  if (noiseType === 'static')    drawStaticNoise();
  else if (noiseType === 'scan') drawScanNoise();
  else                           drawGrainNoise();
  requestAnimationFrame(animate);
}
animate();

const slider  = document.getElementById('noise-slider');
const noiseVal = document.getElementById('noise-val');
slider.addEventListener('input', () => {
  noiseOpacity = slider.value / 100;
  noiseVal.textContent = slider.value + '%';
});

document.querySelectorAll('.noise-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.noise-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    noiseType = btn.dataset.type;
    scanY = 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
});

// ══════════════════════════════════════════════════
//  INVERT TOGGLE
// ══════════════════════════════════════════════════
const invertBtn = document.getElementById('invert-btn');
let isInverted  = false;

invertBtn.addEventListener('click', () => {
  isInverted = !isInverted;
  document.body.classList.toggle('inverted', isInverted);
  invertBtn.classList.toggle('active', isInverted);
});

// ══════════════════════════════════════════════════
//  BIONIC READING ENGINE
//  Based on Renato Casutt's method: bold the first
//  ~40–60% of each word (the "fixation point") so
//  the eye anchors quickly and the brain predicts
//  the rest, reducing subvocalisation and boosting
//  reading speed.
//
//  Fixation length table (by word length):
//    1 char  → bold 1
//    2 chars → bold 1
//    3 chars → bold 2
//    4 chars → bold 2
//    5 chars → bold 2
//    6–7     → bold 3
//    8–9     → bold 4
//    10–13   → bold 5
//    14+     → bold 6
// ══════════════════════════════════════════════════
function fixationLen(wordLen) {
  if (wordLen <= 1)  return 1;
  if (wordLen <= 3)  return 1;
  if (wordLen <= 5)  return 2;
  if (wordLen <= 7)  return 3;
  if (wordLen <= 9)  return 4;
  if (wordLen <= 13) return 5;
  return 6;
}

/**
 * Convert a plain-text string into Bionic Reading HTML.
 * Preserves paragraph breaks (\n\n) as <br><br>.
 * Single newlines become <br>.
 * Punctuation attached to words is handled gracefully.
 */
function bionicHTML(text) {
  // Split into tokens: words and whitespace/newlines
  // We'll process char by char to keep spacing exact
  const lines = text.split('\n');
  const result = lines.map(line => {
    if (line.trim() === '') return '';
    // Split line into word-tokens and space-tokens
    const tokens = line.split(/(\s+)/);
    return tokens.map(tok => {
      if (/^\s+$/.test(tok)) return ' '; // regular space so lines can wrap
      // It's a word token — may have leading/trailing punctuation
      // Strip leading non-alpha chars
      const leadMatch = tok.match(/^([^a-zA-Z\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF]*)/);
      const lead = leadMatch ? leadMatch[1] : '';
      const rest = tok.slice(lead.length);
      // Strip trailing non-alpha chars
      const trailMatch = rest.match(/([^a-zA-Z\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF]*)$/);
      const trail = trailMatch ? trailMatch[1] : '';
      const word  = rest.slice(0, rest.length - trail.length);

      if (!word) return escHtml(tok);

      const n    = fixationLen(word.length);
      const bold = word.slice(0, n);
      const dim  = word.slice(n);

      let out = '<span style="display:inline">' + escHtml(lead);
      out += `<b class="b">${escHtml(bold)}</b>`;
      if (dim) out += `<span class="t">${escHtml(dim)}</span>`;
      out += escHtml(trail) + '</span>';
      return out;
    }).join('');
  });
  // Join lines with <br>, collapse 2+ empty lines into paragraph break
  return result.join('<br>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── State ──
let bionicMode  = false;
let rawTitle    = '';
let rawBody     = '';

const bionicBtn = document.getElementById('bionic-btn');
bionicBtn.addEventListener('click', () => {
  bionicMode = !bionicMode;
  bionicBtn.classList.toggle('active', bionicMode);
  if (currentFileType === 'pdf' && rawPdfDoc) {
    // Re-render PDF with new bionic state
    // Re-use stored arrayBuffer (already loaded)
    loadPDFFromBuffer(rawPdfDoc.arrayBuffer, rawTitle);
  } else if (rawBody) {
    renderText(rawTitle, rawBody);
  }
});

// ══════════════════════════════════════════════════
//  FILE READER — supports .txt and .pdf
// ══════════════════════════════════════════════════
const fileInput = document.getElementById('file-input');
const textLayer = document.getElementById('text-layer');
const charCount = document.getElementById('char-count');

// Configure PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentFileType = 'txt'; // 'txt' or 'pdf'

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'pdf') {
    currentFileType = 'pdf';
    rawBody  = '';
    rawTitle = file.name.replace(/\.pdf$/i, '');
    // Disable bionic for PDF (no extracted text mode)
    if (bionicMode) {
      bionicMode = false;
      bionicBtn.classList.remove('active');
    }
    bionicBtn.disabled = true;
    bionicBtn.style.opacity = '0.3';
    bionicBtn.title = 'Bionic no disponible en modo PDF';
    loadPDF(file);
  } else {
    currentFileType = 'txt';
    bionicBtn.disabled = false;
    bionicBtn.style.opacity = '';
    bionicBtn.title = '';
    const reader = new FileReader();
    reader.onload = ev => {
      rawBody  = ev.target.result;
      rawTitle = file.name.replace(/\.txt$/i, '');
      charCount.textContent = rawBody.length.toLocaleString() + ' chars';
      renderText(rawTitle, rawBody);
    };
    reader.readAsText(file, 'UTF-8');
  }
});

// ── PDF Loader ────────────────────────────────────
// ── PDF: extract text + images interleaved by vertical position ──────
async function loadPDF(file) {
  const ab = await file.arrayBuffer();
  rawPdfDoc = { arrayBuffer: ab };
  return loadPDFFromBuffer(ab, file.name.replace(/\.pdf$/i, ''));
}

async function loadPDFFromBuffer(arrayBuffer, title) {
  rawTitle = title;
  textLayer.innerHTML = `
    <div class="pdf-loading">
      <div class="pdf-loading-bar"></div>
      <p>Extrayendo contenido…</p>
    </div>`;
  charCount.textContent = '—';

  const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const totalPages = pdfDoc.numPages;
  charCount.textContent = totalPages + (totalPages === 1 ? ' página' : ' páginas');

  // Re-enable bionic for PDF text mode
  bionicBtn.disabled = false;
  bionicBtn.style.opacity = '';
  bionicBtn.title = '';

  // Build content
  textLayer.innerHTML = '';
  const titleEl = document.createElement('div');
  titleEl.className = 'article-title';
  titleEl.textContent = rawTitle;
  textLayer.appendChild(titleEl);

  const contentWrap = document.createElement('div');
  contentWrap.className = 'pdf-content';
  textLayer.appendChild(contentWrap);

  // Accumulate all raw text across pages for char count
  let totalChars = 0;

  for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale: 1 });
    const pageH = viewport.height;

    // ── 1. Extract text items ─────────────────────────────────────
    const textContent = await page.getTextContent();
    // Group text items into lines by Y position (within 4pt tolerance)
    const lines = [];
    textContent.items.forEach(item => {
      if (!item.str || !item.str.trim()) return;
      // PDF Y is bottom-up; flip it
      const y = pageH - item.transform[5];
      const existing = lines.find(l => Math.abs(l.y - y) < 6);
      if (existing) {
        existing.text += item.str;
      } else {
        lines.push({ y, text: item.str, type: 'text' });
      }
    });

    // ── 2. Extract images via operator list ───────────────────────
    // We render each image to a small offscreen canvas and capture as dataURL
    const imgItems = [];
    try {
      // Render full page to offscreen canvas first
      const scale = 1.8;
      const scaledVP = page.getViewport({ scale });
      const offCanvas = document.createElement('canvas');
      offCanvas.width  = scaledVP.width;
      offCanvas.height = scaledVP.height;
      const offCtx = offCanvas.getContext('2d');
      await page.render({ canvasContext: offCtx, viewport: scaledVP }).promise;

      // Get operator list to find image positions
      const opList = await page.getOperatorList();
      const OPS = pdfjsLib.OPS;

      // Walk operator list collecting image paint ops with their transform stack
      let transformStack = [{ a:1,b:0,c:0,d:1,e:0,f:0 }];
      const imgOps = [];

      for (let i = 0; i < opList.fnArray.length; i++) {
        const fn = opList.fnArray[i];
        const args = opList.argsArray[i];

        if (fn === OPS.save) {
          transformStack.push({ ...transformStack[transformStack.length - 1] });
        } else if (fn === OPS.restore) {
          if (transformStack.length > 1) transformStack.pop();
        } else if (fn === OPS.transform) {
          // Concatenate: current × new
          const cur = transformStack[transformStack.length - 1];
          const [a,b,c,d,e,f] = args;
          transformStack[transformStack.length - 1] = {
            a: cur.a*a + cur.c*b,
            b: cur.b*a + cur.d*b,
            c: cur.a*c + cur.c*d,
            d: cur.b*c + cur.d*d,
            e: cur.a*e + cur.c*f + cur.e,
            f: cur.b*e + cur.d*f + cur.f,
          };
        } else if (fn === OPS.paintImageXObject ||
                   fn === OPS.paintImageXObjectRepeat ||
                   fn === OPS.paintInlineImageXObject) {
          const m = transformStack[transformStack.length - 1];
          // m.e, m.f = translation (bottom-left of image in PDF units)
          // m.a, m.d = width/height scale
          imgOps.push({
            x: m.e * scale,
            y: (pageH - m.f) * scale,   // flip Y
            w: Math.abs(m.a) * scale,
            h: Math.abs(m.d) * scale,
          });
        }
      }

      // Crop each image from the rendered page canvas
      imgOps.forEach(op => {
        if (op.w < 8 || op.h < 8) return; // skip tiny decoration images
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width  = Math.round(op.w);
        cropCanvas.height = Math.round(op.h);
        cropCanvas.getContext('2d').drawImage(
          offCanvas,
          Math.round(op.x), Math.round(op.y - op.h),
          Math.round(op.w), Math.round(op.h),
          0, 0,
          Math.round(op.w), Math.round(op.h)
        );
        const dataUrl = cropCanvas.toDataURL('image/png');
        // Y position (top of image) in page units for sorting
        const yPos = op.y / scale - op.h / scale;
        imgItems.push({ y: yPos, dataUrl, w: op.w, h: op.h, type: 'image' });
      });
    } catch(e) {
      // Image extraction failed silently — text still shows
    }

    // ── 3. Merge & sort by Y ──────────────────────────────────────
    const allItems = [...lines, ...imgItems].sort((a, b) => a.y - b.y);
    totalChars += lines.reduce((n, l) => n + l.text.length, 0);

    // ── 4. Build DOM for this page ────────────────────────────────
    if (pageNum > 1) {
      const divider = document.createElement('div');
      divider.className = 'pdf-page-divider';
      divider.textContent = 'Página ' + pageNum;
      contentWrap.appendChild(divider);
    }

    const pageSection = document.createElement('div');
    pageSection.className = 'pdf-page-section';

    // Collect consecutive text lines into paragraphs, images as blocks
    let textBuf = '';
    const flush = () => {
      if (!textBuf.trim()) { textBuf = ''; return; }
      const p = document.createElement('div');
      p.className = 'article-body' + (bionicMode ? ' bionic' : '');
      if (bionicMode) {
        p.innerHTML = bionicHTML(textBuf.trim());
      } else {
        p.textContent = textBuf.trim();
      }
      pageSection.appendChild(p);
      textBuf = '';
    };

    allItems.forEach(item => {
      if (item.type === 'text') {
        textBuf += item.text + ' ';
      } else {
        flush();
        const block = document.createElement('div');
        block.className = 'pdf-img-block';
        const img = document.createElement('img');
        img.src = item.dataUrl;
        img.style.maxHeight = '500px';
        block.appendChild(img);
        pageSection.appendChild(block);
      }
    });
    flush();

    contentWrap.appendChild(pageSection);
  }

  if (totalChars > 0) {
    charCount.textContent = totalChars.toLocaleString() + ' chars · ' +
      totalPages + (totalPages === 1 ? ' pág.' : ' págs.');
  }

  // Store raw PDF text for bionic re-render support
}

// Stored PDF reference for re-render on bionic toggle
let rawPdfDoc = null;

// ── TXT renderer ─────────────────────────────────
function renderText(title, body) {
  const bodyEl = document.createElement('div');
  bodyEl.className = 'article-body' + (bionicMode ? ' bionic' : '');

  if (bionicMode) {
    bodyEl.innerHTML = bionicHTML(body);
  } else {
    bodyEl.textContent = body;
  }

  textLayer.innerHTML = '';
  const titleEl = document.createElement('div');
  titleEl.className = 'article-title';
  titleEl.textContent = title;
  textLayer.appendChild(titleEl);
  textLayer.appendChild(bodyEl);
}
</script>
